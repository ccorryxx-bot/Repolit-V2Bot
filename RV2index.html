<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1"/>
<title>Diamond Gaming Support – V2</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+Myanmar:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
/* ── Reset ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{height:100%;height:-webkit-fill-available;}
body{
  min-height:100vh;min-height:100dvh;
  display:flex;justify-content:center;align-items:stretch;
  background:#020208;
  font-family:'Space Grotesk','Noto Sans Myanmar',system-ui,sans-serif;
  color:#f0fdf4;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
/* ── Aurora Background ── */
.aurora-bg{
  position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;
}
.aurora-bg::before{
  content:'';position:absolute;
  width:120%;height:120%;top:-10%;left:-10%;
  background:
    radial-gradient(ellipse 60% 40% at 20% 20%,rgba(0,212,255,.13) 0%,transparent 70%),
    radial-gradient(ellipse 50% 35% at 80% 70%,rgba(16,185,129,.10) 0%,transparent 70%),
    radial-gradient(ellipse 40% 30% at 60% 10%,rgba(255,51,102,.06) 0%,transparent 70%),
    radial-gradient(ellipse 70% 50% at 50% 100%,rgba(6,182,212,.07) 0%,transparent 70%);
  animation:auroraShift 18s ease-in-out infinite alternate;
}
@keyframes auroraShift{
  0%  {transform:translate(0%,0%) scale(1);}
  33% {transform:translate(2%,-2%) scale(1.03);}
  66% {transform:translate(-2%,2%) scale(.98);}
  100%{transform:translate(1%,-1%) scale(1.01);}
}
.dot-grid{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(circle,rgba(0,212,255,.12) 1px,transparent 1px);
  background-size:32px 32px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);
  -webkit-mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);
}
/* ── Admin Panel ── */
#adminPanel{
  position:fixed;top:0;left:0;height:100%;
  width:min(380px,100%);z-index:999;
  display:flex;flex-direction:column;
  background:rgba(4,8,14,.95);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border-right:1px solid rgba(0,212,255,.12);
  box-shadow:24px 0 80px rgba(0,0,0,.70),inset -1px 0 0 rgba(0,212,255,.05);
  transform:translateX(-100%);
  transition:transform .38s cubic-bezier(.4,0,.2,1);
}
#adminPanel.open{transform:translateX(0);}
#adminPanel::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,212,255,.55),transparent);
}
.panel-overlay{
  display:none;position:fixed;inset:0;z-index:998;
  background:rgba(0,0,0,.60);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  transition:opacity .25s;
}
.panel-overlay.show{display:block;}
.panel-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px 16px;
  border-bottom:1px solid rgba(0,212,255,.08);
  flex-shrink:0;
}
.panel-title-wrap .panel-title{
  display:flex;align-items:center;gap:8px;margin-bottom:6px;
  color:#00d4ff;font-family:'JetBrains Mono',monospace;
  font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
}
.panel-status{display:flex;align-items:center;gap:6px;}
.panel-status-dot{
  width:6px;height:6px;border-radius:50%;background:#10b981;
  box-shadow:0 0 8px #10b981;animation:microPulse 2s ease-in-out infinite;
}
.panel-status-text{
  font-size:10px;font-family:'JetBrains Mono',monospace;
  color:rgba(16,185,129,.75);letter-spacing:.08em;text-transform:uppercase;
}
.panel-close{
  width:30px;height:30px;border-radius:10px;border:none;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  color:rgba(255,255,255,.5);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:.18s ease;
}
.panel-close:hover{background:rgba(255,255,255,.10);color:#fff;transform:rotate(90deg);}
.panel-tabs{display:flex;gap:8px;padding:12px 20px;flex-shrink:0;}
.tab-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:9px;border-radius:10px;cursor:pointer;
  border:1px solid rgba(255,255,255,.06);
  background:rgba(255,255,255,.02);
  color:rgba(255,255,255,.35);font-size:11px;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;
  font-family:'JetBrains Mono',monospace;transition:.18s ease;
}
.tab-btn.active{
  background:rgba(0,212,255,.08);border-color:rgba(0,212,255,.28);color:#67e8f9;
}
.tab-panel{display:none;flex:1;flex-direction:column;gap:12px;padding:0 20px 20px;min-height:0;overflow:hidden;}
.tab-panel.active{display:flex;}
.panel-label{
  font-size:10px;font-family:'JetBrains Mono',monospace;
  color:rgba(0,212,255,.45);letter-spacing:.08em;text-transform:uppercase;flex-shrink:0;
}
textarea{
  flex:1;width:100%;border-radius:14px;padding:14px 16px;resize:none;outline:none;
  background:rgba(0,212,255,.03);border:1px solid rgba(0,212,255,.12);
  color:#a7f3d0;font-size:13px;line-height:1.75;
  font-family:'Space Grotesk','Noto Sans Myanmar',sans-serif;
  transition:border-color .2s,box-shadow .2s;
  scrollbar-width:thin;scrollbar-color:rgba(0,212,255,.15) transparent;
  min-height:0;
}
textarea:focus{
  border-color:rgba(0,212,255,.35);
  box-shadow:0 0 0 3px rgba(0,212,255,.06),inset 0 0 20px rgba(0,212,255,.02);
}
textarea::-webkit-scrollbar{width:3px;}
textarea::-webkit-scrollbar-thumb{background:rgba(0,212,255,.2);border-radius:99px;}
#saveBtn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:14px;border-radius:14px;border:none;cursor:pointer;
  font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  font-family:'JetBrains Mono',monospace;
  background:linear-gradient(135deg,rgba(0,212,255,.15),rgba(6,182,212,.10));
  border:1px solid rgba(0,212,255,.25);color:#67e8f9;
  box-shadow:0 0 20px rgba(0,212,255,.08);
  transition:.2s ease;flex-shrink:0;
}
#saveBtn:hover{filter:brightness(1.15);transform:translateY(-1px);}
#saveBtn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
#saveBtn.saved{
  background:linear-gradient(135deg,rgba(5,150,105,.2),rgba(16,185,129,.12));
  border-color:rgba(16,185,129,.4);color:#6ee7b7;
  box-shadow:0 0 20px rgba(16,185,129,.15);
}
.log-box{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;min-height:0;scrollbar-width:none;}
.log-box::-webkit-scrollbar{display:none;}
.log-card{
  background:rgba(0,212,255,.03);border:1px solid rgba(0,212,255,.08);
  border-radius:12px;padding:10px 14px;transition:border-color .2s;
}
.log-card:hover{border-color:rgba(0,212,255,.18);}
.log-q{font-size:11px;color:#67e8f9;font-weight:600;margin-bottom:5px;line-height:1.4;}
.log-a{font-size:11px;color:rgba(255,255,255,.38);line-height:1.5;}
.log-t{font-size:10px;color:rgba(0,212,255,.28);margin-top:6px;font-family:'JetBrains Mono',monospace;}
.log-empty{font-size:12px;color:rgba(255,255,255,.25);text-align:center;margin-top:20px;font-family:'JetBrains Mono',monospace;}
/* ── Chat Container ── */
.chat-container{
  width:100%;max-width:580px;
  display:flex;flex-direction:column;
  background:rgba(8,14,22,.75);
  backdrop-filter:blur(24px) saturate(160%);
  -webkit-backdrop-filter:blur(24px) saturate(160%);
  border-left:1px solid rgba(0,212,255,.08);
  border-right:1px solid rgba(0,212,255,.08);
  position:relative;z-index:1;
  box-shadow:0 0 120px rgba(0,0,0,.75),inset 1px 0 0 rgba(0,212,255,.04),inset -1px 0 0 rgba(0,212,255,.04);
  overflow:hidden;
}
.chat-container::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;z-index:20;pointer-events:none;
  background:linear-gradient(90deg,transparent 0%,rgba(0,212,255,.6) 30%,rgba(16,185,129,.5) 65%,transparent 100%);
}
/* ── Header ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;flex-shrink:0;
  border-bottom:1px solid rgba(0,212,255,.07);
  background:rgba(0,0,0,.25);
}
.brand{display:flex;align-items:center;gap:14px;}
.logo-btn{
  position:relative;width:44px;height:44px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  background:linear-gradient(135deg,rgba(0,212,255,.15),rgba(6,182,212,.08));
  border:1px solid rgba(0,212,255,.25);
  box-shadow:0 0 20px rgba(0,212,255,.12),inset 0 1px 0 rgba(255,255,255,.06);
  cursor:pointer;flex-shrink:0;overflow:hidden;
  transition:transform .2s ease,box-shadow .2s ease;
}
.logo-btn:hover{transform:scale(1.06);box-shadow:0 0 28px rgba(0,212,255,.22);}
.logo-btn:active{transform:scale(.95);}
.logo-btn::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.06) 50%,transparent 60%);
}
.brand-name{
  background:linear-gradient(90deg,#00d4ff 0%,#06b6d4 30%,#f0fdfa 55%,#67e8f9 75%,#00d4ff 100%);
  background-size:300% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  font-size:16px;font-weight:700;line-height:1.2;letter-spacing:-.01em;
  animation:textShimmer 4s linear infinite;
}
@keyframes textShimmer{
  0%{background-position:0% center;}100%{background-position:300% center;}
}
.brand-status{display:flex;align-items:center;gap:6px;margin-top:4px;}
.status-dot{
  width:6px;height:6px;border-radius:50%;background:#10b981;
  box-shadow:0 0 8px #10b981;animation:microPulse 2s ease-in-out infinite;
}
.status-text{
  font-size:10px;font-family:'JetBrains Mono',monospace;
  color:rgba(16,185,129,.75);letter-spacing:.08em;text-transform:uppercase;
}
@keyframes microPulse{
  0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.4);opacity:.6;}
}
.header-right{display:flex;align-items:center;gap:12px;}
.online-widget{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.online-num{
  display:flex;align-items:center;gap:5px;
  font-size:11px;font-weight:700;color:#67e8f9;
  font-family:'JetBrains Mono',monospace;
}
.online-num svg{color:#00d4ff;}
.online-label{font-size:9px;color:rgba(255,255,255,.25);letter-spacing:.05em;}
.live-badge{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:8px;
  background:rgba(255,51,102,.08);border:1px solid rgba(255,51,102,.20);
}
.live-dot{
  width:6px;height:6px;border-radius:50%;background:#ff3366;
  box-shadow:0 0 6px #ff3366;animation:microPulse 1.5s ease-in-out infinite;
}
.live-text{
  font-size:9px;font-weight:700;color:#ff6699;letter-spacing:.08em;
  font-family:'JetBrains Mono',monospace;text-transform:uppercase;
}
/* ── Chatbox ── */
.chatbox{
  flex:1;overflow-y:auto;padding:20px;
  display:flex;flex-direction:column;gap:14px;
  scroll-behavior:smooth;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;
}
.chatbox::-webkit-scrollbar{display:none;}
/* Bot message */
.bot-row{
  display:flex;align-items:flex-end;gap:12px;align-self:flex-start;
  max-width:85%;
  animation:msgInLeft .28s cubic-bezier(.34,1.56,.64,1);
}
@keyframes msgInLeft{
  from{transform:translateX(-20px) scale(.94);opacity:0;}
  to{transform:translateX(0) scale(1);opacity:1;}
}
.bot-avatar{
  position:relative;width:32px;height:32px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:14px;
  background:linear-gradient(135deg,rgba(0,212,255,.14),rgba(6,182,212,.07));
  border:1px solid rgba(0,212,255,.22);
  box-shadow:0 0 14px rgba(0,212,255,.12),inset 0 1px 0 rgba(255,255,255,.05);
  overflow:hidden;margin-bottom:26px;
}
.bot-avatar::after{
  content:'';position:absolute;left:0;right:0;height:30%;
  background:linear-gradient(to bottom,transparent,rgba(0,212,255,.3),transparent);
  animation:scanline 2.8s linear infinite;
}
@keyframes scanline{0%{top:-100%;}100%{top:200%;}}
.bot-col{display:flex;flex-direction:column;gap:6px;}
.bot-bubble{
  padding:14px 16px;border-radius:18px;border-bottom-left-radius:5px;
  font-size:14px;line-height:1.75;break-word:break-word;white-space:pre-wrap;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(0,212,255,.10);
  box-shadow:0 4px 24px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.03);
  color:rgba(240,253,250,.90);word-break:break-word;
}
.bot-bubble.typewriting::after{
  content:'▋';font-size:.9em;color:#00d4ff;
  animation:cursorBlink .8s step-end infinite;margin-left:2px;
}
@keyframes cursorBlink{0%,100%{opacity:1;}50%{opacity:0;}}
/* User message */
.user-wrap{
  display:flex;flex-direction:column;align-items:flex-end;gap:6px;
  align-self:flex-end;max-width:80%;
  animation:msgInRight .28s cubic-bezier(.34,1.56,.64,1);
}
@keyframes msgInRight{
  from{transform:translateX(20px) scale(.94);opacity:0;}
  to{transform:translateX(0) scale(1);opacity:1;}
}
.user-bubble{
  padding:12px 16px;border-radius:18px;border-bottom-right-radius:5px;
  font-size:14px;line-height:1.75;color:#fff;word-break:break-word;
  background:linear-gradient(135deg,rgba(0,212,255,.22),rgba(6,182,212,.16));
  border:1px solid rgba(0,212,255,.22);
  box-shadow:0 4px 24px rgba(0,212,255,.12),inset 0 1px 0 rgba(255,255,255,.06);
}
.user-meta{display:flex;align-items:center;gap:6px;padding-right:2px;}
.msg-time{
  font-size:10px;color:rgba(255,255,255,.22);
  font-family:'JetBrains Mono',monospace;
}
.msg-status{
  font-size:11px;font-weight:700;letter-spacing:.5px;
  color:rgba(255,255,255,.25);transition:color .4s,text-shadow .4s;
}
.msg-status.delivered{color:#00d4ff;text-shadow:0 0 8px rgba(0,212,255,.6);}
/* Rating row */
.rating-row{display:flex;align-items:center;gap:6px;padding-left:2px;flex-wrap:wrap;}
.rate-btn{
  width:24px;height:24px;border-radius:8px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  color:rgba(255,255,255,.3);transition:.18s cubic-bezier(.34,1.56,.64,1);
}
.rate-btn:hover{transform:scale(1.15);}
.rate-btn.liked{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.3);color:#34d399;}
.rate-btn.disliked{background:rgba(255,51,102,.10);border-color:rgba(255,51,102,.25);color:#ff6699;}
.rate-label{font-size:10px;color:rgba(255,255,255,.3);}
.model-tag{
  font-size:9px;color:rgba(0,212,255,.3);letter-spacing:.04em;
  font-family:'JetBrains Mono',monospace;padding-left:2px;margin-top:2px;
}
/* Typing indicator */
.typing-row{
  display:flex;align-items:flex-end;gap:12px;align-self:flex-start;
  animation:msgInLeft .22s cubic-bezier(.34,1.56,.64,1);
}
.typing-label{
  font-size:10px;font-family:'JetBrains Mono',monospace;
  color:rgba(0,212,255,.4);letter-spacing:.08em;text-transform:uppercase;
  padding-left:2px;margin-bottom:4px;animation:fadeLabel 1.8s ease infinite;
}
@keyframes fadeLabel{0%,100%{opacity:.4;}50%{opacity:.9;}}
.thinking-bubble{
  display:flex;gap:7px;align-items:center;padding:12px 16px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(0,212,255,.10);
  border-radius:18px;border-bottom-left-radius:5px;
  box-shadow:0 4px 24px rgba(0,0,0,.3);
}
.thinking-bubble span{
  width:8px;height:8px;border-radius:50%;
  animation:typeDot 1.2s ease-in-out infinite;
}
.thinking-bubble span:nth-child(1){background:#00d4ff;box-shadow:0 0 6px #00d4ff;}
.thinking-bubble span:nth-child(2){background:#06b6d4;box-shadow:0 0 6px #06b6d4;animation-delay:.15s;}
.thinking-bubble span:nth-child(3){background:#10b981;box-shadow:0 0 6px #10b981;animation-delay:.30s;}
@keyframes typeDot{
  0%,60%,100%{transform:translateY(0);opacity:.35;}
  30%{transform:translateY(-7px);opacity:1;}
}
/* Message link */
.msg-link{color:#67e8f9;text-decoration:underline;text-underline-offset:3px;text-decoration-color:rgba(103,232,249,.35);word-break:break-all;cursor:pointer;transition:color .15s;}
.msg-link:hover{color:#00d4ff;}
/* ── Scroll FAB ── */
.scroll-fab{
  position:absolute;bottom:90px;right:14px;
  width:36px;height:36px;border-radius:12px;border:none;cursor:pointer;z-index:20;
  background:rgba(0,212,255,.12);border:1px solid rgba(0,212,255,.25);
  color:#67e8f9;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(0,212,255,.15);
  opacity:0;transform:translateY(10px) scale(.8);
  transition:.28s cubic-bezier(.34,1.56,.64,1);pointer-events:none;
}
.scroll-fab.visible{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
.scroll-fab:hover{transform:scale(1.08);box-shadow:0 4px 24px rgba(0,212,255,.25);}
/* ── Quick Actions ── */
.quick-strip{
  display:flex;gap:8px;padding:10px 16px;
  overflow-x:auto;scrollbar-width:none;flex-shrink:0;
  border-top:1px solid rgba(0,212,255,.05);
  background:rgba(0,0,0,.20);
}
.quick-strip::-webkit-scrollbar{display:none;}
.q-chip{
  white-space:nowrap;flex-shrink:0;
  display:flex;align-items:center;gap:7px;
  padding:8px 14px;border-radius:10px;border:none;cursor:pointer;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  color:rgba(255,255,255,.65);font-size:12px;font-weight:500;
  font-family:'Space Grotesk','Noto Sans Myanmar',sans-serif;
  transition:all .18s cubic-bezier(.34,1.56,.64,1);
}
.q-chip:hover{
  background:rgba(0,212,255,.10);border-color:rgba(0,212,255,.28);
  transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,212,255,.15);
}
.q-chip:active{transform:translateY(1px);}
.q-icon{color:#00d4ff;font-size:11px;}
/* ── Footer ── */
footer{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px 18px;flex-shrink:0;
  border-top:1px solid rgba(0,212,255,.07);
  background:rgba(0,0,0,.40);
  position:sticky;bottom:0;z-index:10;
}
.input-wrap{flex:1;position:relative;}
.input-ring-wrap{
  position:absolute;inset:-1px;border-radius:15px;
  background:linear-gradient(90deg,#00d4ff,#10b981,#00d4ff);
  background-size:200% 100%;padding:1px;
  mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  mask-composite:xor;-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;opacity:0;
  animation:ringFlow 3s linear infinite;transition:opacity .3s;pointer-events:none;
}
.input-wrap:focus-within .input-ring-wrap{opacity:.55;}
@keyframes ringFlow{0%{background-position:0% 50%;}100%{background-position:200% 50%;}}
#userInput{
  width:100%;padding:12px 18px;border-radius:14px;outline:none;
  font-size:14px;color:#fff;letter-spacing:.01em;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  caret-color:#00d4ff;font-family:'Space Grotesk','Noto Sans Myanmar',sans-serif;
  transition:border-color .25s,box-shadow .25s,background .25s;
}
#userInput::placeholder{color:rgba(255,255,255,.28);}
#userInput:focus{
  border-color:rgba(0,212,255,.28);
  box-shadow:0 0 0 3px rgba(0,212,255,.06),inset 0 1px 0 rgba(255,255,255,.04);
  background:rgba(0,212,255,.04);
}
.send-btn{

/* ═══════ PARTICLES ═══════ */
function spawnParticles(cx,cy){
  const canvas=document.getElementById('particleCanvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  const colors=['#00d4ff','#06b6d4','#10b981','#f0fdfa','#ff3366','#34d399','#67e8f9'];
  const emojis=['💎','✦','◈','✧','⬡'];
  const parts=Array.from({length:32},()=>({
    x:cx,y:cy,vx:(Math.random()-.5)*14,vy:(Math.random()-.5)*14-4,
    size:Math.random()*5+2,color:colors[Math.floor(Math.random()*colors.length)],
    emoji:Math.random()>.68?emojis[Math.floor(Math.random()*emojis.length)]:null,
    life:1,decay:Math.random()*.018+.012,gravity:.22,
  }));
  (function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=false;
    parts.forEach(p=>{
      if(p.life<=0)return; alive=true;
      p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.vx*=.96; p.life-=p.decay;
      ctx.globalAlpha=Math.max(0,p.life);
      if(p.emoji){ctx.font=`${p.size*3.5}px serif`;ctx.fillText(p.emoji,p.x,p.y);}
      else{ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=12;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
    });
    ctx.globalAlpha=1;
    if(alive)requestAnimationFrame(animate);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  })();
}
/* ═══════ SOUND ═══════ */
let audioCtx;
function playNotif(){
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    [523,659].forEach((freq,i)=>{
      const osc=audioCtx.createOscillator(),gain=audioCtx.createGain();
      osc.connect(gain);gain.connect(audioCtx.destination);
      osc.type='triangle';osc.frequency.value=freq;
      const t=audioCtx.currentTime+i*.10;
      gain.gain.setValueAtTime(0,t);gain.gain.linearRampToValueAtTime(.08,t+.015);gain.gain.exponentialRampToValueAtTime(.001,t+.28);
      osc.start(t);osc.stop(t+.28);
    });
  }catch(_){}
}
/* ═══════ NOTIFICATIONS & TITLE FLASH ═══════ */
let unread=0,flashTimer=null;
const ORIG_TITLE='Diamond Gaming Support – V2';

function notifyUnread(){

function reqNotifPerm(){if(typeof Notification!=='undefined'&&Notification.permission==='default')Notification.requestPermission();}

/* ═══════ HELPERS ═══════ */
function linkify(t){return t.replace(/(https?:\/\/[^\s]+)/g,u=>`<a href="${u}" target="_blank" rel="noopener" class="msg-link">${u}</a>`);}
function formatBot(t){return linkify(t).replace(/\*\*(.*?)\*\*/g,`<strong style="color:#f0fdf4">$1</strong>`).replace(/^━+$/gm,'<hr style="border:none;border-top:1px solid rgba(0,212,255,.1);margin:10px 0">').replace(/\n{2,}/g,'</p><p style="margin-top:10px">').replace(/\n/g,'<br>');}
function getTime(){return new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});}
/* ═══════ MESSAGES ═══════ */
let lastStatusEl=null;
function addMessage(role,text,typewriter=false,model=null){
  const box=document.getElementById('chatbox'),time=getTime();
  if(role==='user'){
    const wrap=document.createElement('div'); wrap.className='user-wrap';
    const bubble=document.createElement('div'); bubble.className='user-bubble'; bubble.innerHTML=linkify(text);
    const meta=document.createElement('div'); meta.className='user-meta';
    const ts=document.createElement('span'); ts.className='msg-time'; ts.textContent=time;
    const st=document.createElement('span'); st.className='msg-status'; st.textContent='✓';
    lastStatusEl=st; meta.append(ts,st); wrap.append(bubble,meta); box.appendChild(wrap);
    box.scrollTo({top:box.scrollHeight,behavior:'smooth'}); return;
  }
  const row=document.createElement('div'); row.className='bot-row';
  const avatar=document.createElement('div'); avatar.className='bot-avatar'; avatar.textContent='💎';
  const col=document.createElement('div'); col.className='bot-col';
  const bubble=document.createElement('div'); bubble.className='bot-bubble';
  const ts=document.createElement('div'); ts.className='msg-time'; ts.textContent=time;
  const rrow=document.createElement('div'); rrow.className='rating-row';
  const likeBtn=document.createElement('button'); likeBtn.className='rate-btn'; likeBtn.textContent='↑'; likeBtn.title='Helpful';
  const dislBtn=document.createElement('button'); dislBtn.className='rate-btn'; dislBtn.textContent='↓'; dislBtn.title='Not helpful';
  const rlabel=document.createElement('span'); rlabel.className='rate-label';
  likeBtn.onclick=()=>{likeBtn.classList.toggle('liked',true);dislBtn.classList.remove('disliked');rlabel.textContent='ကျေးဇူးတင်ပါတယ်!';};
  dislBtn.onclick=()=>{dislBtn.classList.toggle('disliked',true);likeBtn.classList.remove('liked');rlabel.textContent='မှတ်သားပါမယ် 🙏';};
  rrow.append(likeBtn,dislBtn,rlabel);
  col.append(bubble,ts,rrow);
  if(model){const mt=document.createElement('div');mt.className='model-tag';mt.textContent='⚡ '+model;col.appendChild(mt);}
  row.append(avatar,col); box.appendChild(row);
  box.scrollTo({top:box.scrollHeight,behavior:'smooth'});
  if(typewriter){
    bubble.classList.add('typewriting');
    let i=0;
    const tick=()=>{if(i<text.length){bubble.innerHTML=formatBot(linkify(text.slice(0,++i)));box.scrollTop=box.scrollHeight;setTimeout(tick,14);}else{bubble.classList.remove('typewriting');}};
    setTimeout(tick,60);
  } else { bubble.innerHTML=formatBot(linkify(text)); }
}
function showThinking(){
  const box=document.getElementById('chatbox');
  const row=document.createElement('div'); row.className='typing-row'; row.id='thinking';
  const avatar=document.createElement('div'); avatar.className='bot-avatar'; avatar.textContent='💎';
  const col=document.createElement('div'); col.style.cssText='display:flex;flex-direction:column;gap:5px;';
  const lbl=document.createElement('div'); lbl.className='typing-label'; lbl.textContent='processing...';
  const bub=document.createElement('div'); bub.className='thinking-bubble';
  bub.innerHTML='<span></span><span></span><span></span>';
  col.append(lbl,bub); row.append(avatar,col); box.appendChild(row);
  box.scrollTo({top:box.scrollHeight,behavior:'smooth'});
}
function hideThinking(){const el=document.getElementById('thinking');if(el)el.remove();}
/* ═══════ SEND ═══════ */
async function handleSend(){
  const input=document.getElementById('userInput'),btn=document.getElementById('sendBtn');
  const text=input.value.trim(),kb=document.getElementById('knowledgeBase').value;
  if(!text)return;
  addMessage('user',text); input.value=''; btn.disabled=true;
  showThinking(); reqNotifPerm();
  chatHistory.push({role:'user',content:text});
  if(chatHistory.length>MAX_HISTORY) chatHistory=chatHistory.slice(-MAX_HISTORY);
  try{
    const res=await fetch(WORKER_URL,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:[
        {role:'system',content:`သင်သည် Diamond Gaming မှ Support ဖြစ်သည်။ Knowledge Base ကိုသာ သုံး၍ မြန်မာလို ယဉ်ကျေးစွာ ဖြေပေးပါ။ Customer ၏ context ကို မှတ်မိပြီး ဆက်ပြောပါ။\n\n${kb}`},
        ...chatHistory
      ]})
    });
    const data=await res.json();
    const reply=data?.choices?.[0]?.message?.content||'တောင်းပန်ပါတယ်၊ ခဏနေမှ ထပ်ကြိုးစားပါ။';
    chatHistory.push({role:'assistant',content:reply});
    if(chatHistory.length>MAX_HISTORY) chatHistory=chatHistory.slice(-MAX_HISTORY);
    hideThinking();
    addMessage('bot',reply,true,data?.model_name||undefined);
    if(lastStatusEl){setTimeout(()=>{lastStatusEl.textContent='✓✓';lastStatusEl.classList.add('delivered');lastStatusEl=null;},350);}
    spawnParticles(window.innerWidth/2,window.innerHeight*.72);
    playNotif(); notifyUnread(); logChat(text,reply);
  }catch(e){hideThinking();addMessage('bot','⚠ Error: '+e.message,true);playNotif();}
  btn.disabled=false; input.focus();
}
